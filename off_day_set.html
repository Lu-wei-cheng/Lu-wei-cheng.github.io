<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台導覽</title>
    <style>
        /* 基礎樣式重設與字型設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 按鈕容器（RWD 核心） */
        .button-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
        }

        /* 通用按鈕樣式 */
        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }

        /* 各別按鈕顏色與懸停效果 */
        .btn-sync {
            background-color: #ff9800; /* 亮橘色 */
        }
        .btn-sync:hover {
            background-color: #e68a00;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 152, 0, 0.3);
        }

        .btn-setting {
            background-color: #4caf50; /* Google 試算表風的綠色 */
        }
        .btn-setting:hover {
            background-color: #43a047;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-test {
            background-color: #2196f3; /* 藍色 */
        }
        .btn-test:hover {
            background-color: #1e88e5;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3);
        }

        /* 響應式斷點設定：當螢幕寬度小於 600px 時（如手機） */
        @media (max-width: 600px) {
            .button-container {
                flex-direction: column; /* 轉為直向排列 */
                gap: 15px;
            }
            .btn {
                width: 100%;
                padding: 16px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="https://lulouis.app.n8n.cloud/form/187531d2-61bb-4bc3-8608-30382ec1393c" target="_blank" class="btn btn-sync">
            同步
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1psvKsSH2L4i6ARZs-eXIHW3Kalf8QbVlKx1S5WPTW68/edit?usp=sharing" target="_blank" class="btn btn-setting">
            設定
        </a>

        <a href="https://lu-wei-cheng.github.io/Test_viewer.html" target="_blank" class="btn btn-test">
            測試
        </a>
    </div>

</body>
</html>
